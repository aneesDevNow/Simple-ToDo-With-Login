services:
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-organizer
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/data/todo.db
    volumes:
      - todo-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Dokploy labels
      - dokploy.service=todo-organizer
      - dokploy.port=3000
      - dokploy.protocol=http

volumes:
  todo-data:
    driver: local
