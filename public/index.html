<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Organizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-logo">Todo Organizer</h1>
      <p class="auth-subtitle">Organize your life, one task at a time</p>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <h2>Sign In</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn-primary">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-register">Register</a></p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form" style="display:none">
        <h2>Create Account</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 4 characters" required minlength="4">
        </div>
        <div id="register-error" class="error-msg"></div>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign In</a></p>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="app-screen" style="display:none">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 class="app-title">Todo Organizer</h1>
      </div>
      <div class="top-bar-right">
        <span id="user-greeting" class="user-greeting"></span>
        <button id="logout-btn" class="btn-logout">Logout</button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Schedule Panel (Left) -->
      <aside class="schedule-panel">
        <div class="panel-header">
          <h2>Schedule</h2>
        </div>
        <div id="schedule-list" class="schedule-list"></div>
      </aside>

      <!-- Lists Panel (Right) -->
      <section class="lists-panel">
        <div class="panel-header">
          <h2>Lists</h2>
          <button id="add-list-btn" class="btn-icon" title="Add List">+</button>
        </div>
        <div id="lists-grid" class="lists-grid"></div>
      </section>
    </div>

    <!-- Add Todo Modal -->
    <div id="todo-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">Add Task</h3>
          <button class="modal-close" id="close-todo-modal">&times;</button>
        </div>
        <form id="todo-form">
          <div class="form-group">
            <label>Task</label>
            <input type="text" id="todo-title" placeholder="What needs to be done?" required>
          </div>
          <div class="form-group">
            <label>List</label>
            <select id="todo-list-select" required></select>
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="todo-due-date">
          </div>
          <div class="form-group">
            <label>Repeat</label>
            <select id="todo-repeat">
              <option value="">No repeat</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>
          <input type="hidden" id="todo-edit-id">
          <button type="submit" class="btn-primary">Save Task</button>
        </form>
      </div>
    </div>

    <!-- Add List Modal -->
    <div id="list-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3>New List</h3>
          <button class="modal-close" id="close-list-modal">&times;</button>
        </div>
        <form id="list-form">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="list-name" placeholder="List name" required>
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="list-emoji" placeholder="e.g. 📋" maxlength="4">
          </div>
          <div class="form-group">
            <label>Color</label>
            <div class="color-options">
              <button type="button" class="color-dot" data-color="#5b6abf" style="background:#5b6abf"></button>
              <button type="button" class="color-dot" data-color="#2d9c6f" style="background:#2d9c6f"></button>
              <button type="button" class="color-dot" data-color="#4a8fa8" style="background:#4a8fa8"></button>
              <button type="button" class="color-dot" data-color="#c0533a" style="background:#c0533a"></button>
              <button type="button" class="color-dot" data-color="#8fa4ae" style="background:#8fa4ae"></button>
              <button type="button" class="color-dot" data-color="#7c5cbf" style="background:#7c5cbf"></button>
              <button type="button" class="color-dot" data-color="#bf8c3a" style="background:#bf8c3a"></button>
              <button type="button" class="color-dot" data-color="#3a8bbf" style="background:#3a8bbf"></button>
            </div>
            <input type="hidden" id="list-color" value="#5b6abf">
          </div>
          <button type="submit" class="btn-primary">Create List</button>
        </form>
      </div>
    </div>

    <!-- Floating Add Button -->
    <button id="fab-add" class="fab" title="Add Task">+</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
